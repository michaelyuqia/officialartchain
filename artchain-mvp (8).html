        radial-gradient(rgba(22,22,22,0.04) 1px, transparent 1px),
        radial-gradient(rgba(22,22,22,0.025) 1px, transparent 1px);
      background-size: 3px 3px, 7px 7px;
      background-position: 0 0, 1px 1px;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .anim-fadeup { animation: fadeUp 0.7s cubic-bezier(0.2,0.7,0.2,1) backwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .anim-fade { animation: fadeIn 0.7s ease-out backwards; }
    @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    .draw-line { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawLine 1.4s ease-out forwards; }
    @keyframes spinSlow { to { transform: rotate(360deg); } }
    .spin-slow { animation: spinSlow 3s linear infinite; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .ticker { animation: ticker 40s linear infinite; }
    @keyframes fillBar { from { width: 0; } }
    .fill-bar { animation: fillBar 1.2s cubic-bezier(0.2,0.7,0.2,1) backwards; }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }

    .boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;

    .boot .dot { width: 6px; height: 6px; border-radius: 50%; background: #6B1F1F; margin-right: 10px; animation: pulseDot 1.2s ease-in-out infinite; }

  function ArtSVG({ work, hideCatalog = false }) {
    const [c1, c2, c3, c4] = work.palette;

    const elements = ART_BY_ID[work.id] || ART_BY_ID["comp-14"];
    const bgId = "bg-" + work.id + "-" + Math.random().toString(36).slice(2, 7);
    const glowId = "glow-" + work.id + "-" + Math.random().toString(36).slice(2, 7);

    return (
      <svg viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice"
           style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%" }}>
        <defs>
          <linearGradient id={bgId} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stopColor={c4} stopOpacity="1"/>
            <stop offset="60%"  stopColor={c3} stopOpacity="0.85"/>
            <stop offset="100%" stopColor={c2} stopOpacity="0.55"/>
          </linearGradient>
          <radialGradient id={glowId} cx="35%" cy="40%" r="65%">
            <stop offset="0%"   stopColor={c4} stopOpacity="0.45"/>
            <stop offset="100%" stopColor={c1} stopOpacity="0"/>
          </radialGradient>
        </defs>
        <rect width="400" height="500" fill={"url(#" + bgId + ")"} />
        <rect width="400" height="500" fill={"url(#" + glowId + ")"} />
        <circle cx="120" cy="160" r="140" fill={c2} opacity="0.18" />
        <circle cx="320" cy="280" r="110" fill={c3} opacity="0.16" />
        <circle cx="200" cy="380" r="90"  fill={c1} opacity="0.14" />
        {elements.map((el, i) => {
          if (el.type === "path") {
            return <path key={i} d={el.d} stroke={palette[el.c]} strokeWidth={el.w} fill="none" opacity={el.op} strokeLinecap="round" />;
          }
          return <circle key={i} cx={el.cx} cy={el.cy} r={el.r} fill={palette[el.c]} opacity={el.op} />;
        })}
        {!hideCatalog && (
          <g>
            <rect x="0" y="430" width="400" height="70" fill={c4} opacity="0.96" />
            <line x1="20" y1="445" x2="40" y2="445" stroke={c1} strokeWidth="0.8" />

              {work.title}
            </text>
          </g>
        )}
      </svg>
    );

  function AreaChart({ data, accent = "#6B1F1F", height = 110, showLabels = false }) {
    const w = 600, pad = 4;
    const max = Math.max(...data.map(d => d.v));
    const pts = data.map((d, i) => {
      const x = (i / (data.length - 1)) * (w - pad * 2) + pad;
      const y = height - (d.v / max) * (height - 16) - 4;
      return [x, y];
    });
    const linePath = pts.map(([x, y], i) => (i === 0 ? "M" : "L") + " " + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
    const areaPath = linePath + " L " + (w - pad) + " " + height + " L " + pad + " " + height + " Z";
    const gradId = "g-" + accent.slice(1);
    return (
      <svg viewBox={"0 0 " + w + " " + height} className="w-full" style={{ height: height + "px" }} preserveAspectRatio="none">
        <defs>
          <linearGradient id={gradId} x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stopColor={accent} stopOpacity="0.22" />
            <stop offset="100%" stopColor={accent} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0.25, 0.5, 0.75].map(t => (
          <line key={t} x1={pad} x2={w - pad} y1={height * t + 4} y2={height * t + 4}
                stroke="#161616" strokeOpacity="0.06" strokeDasharray="2 4" />
        ))}
        <path d={areaPath} fill={"url(#" + gradId + ")"} />
        <path d={linePath} fill="none" stroke={accent} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
        {pts.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r="2.4" fill="#FAF6EC" stroke={accent} strokeWidth="1.4" />
        ))}
        {showLabels && data.map((d, i) => {
          const [x] = pts[i];
          return <text key={i} x={x} y={height - 0} fill="#6F665A" textAnchor="middle"
                       style={{ fontFamily: "JetBrains Mono", fontSize: "8px", letterSpacing: "0.1em" }}>
                   {d.m.toUpperCase()}
                 </text>;
        })}
      </svg>
    );
  }

  function RequestScreen({ work, request, setRequest, onSubmit }) {

    const durations = ["3 months", "6 months", "12 months", "24 months", "36 months"];
    const feeMap = { "3 months": 0.4, "6 months": 0.6, "12 months": 1, "24 months": 1.7, "36 months": 2.2 };
    const baseFee = work.feeRange[1] * 0.55;
    const computedFee = Math.round(baseFee * (feeMap[request.duration] || 1) / 1000) * 1000;
    const commission = Math.round(computedFee * 0.15);
    const aiUplift = request.aiOptIn ? Math.round(computedFee * 0.18) : 0;

    useEffect(() => { setRequest(r => ({ ...r, fee: totalFee })); }, [request.duration, request.aiOptIn]);

    const conflict = useMemo(() => {
      const isApparel = request.productType === "Apparel — Capsule";
      const hasApparelConflict = work.rights.licensed.some(r => r.includes("Apparel"));

      const isCommercial = request.productType === "Luxury accessories" && request.territory === "Worldwide";
      if (isCommercial && hasApparelConflict) {
        return { state: "warn", msg: "Worldwide grant overlaps with LVMH apparel scope in EU. Auto-adjusted: scope excludes EU apparel category." };

      return { state: "clear", msg: "No conflicts. All requested rights available in stated territory and duration." };

                {conflict.state === "clear"   && <ShieldCheck size={16} className="leaf flex-shrink-0 mt-0.5" />}

    const [done, setDone] = useState(0);

              <p className="text-[14px] muted mt-2 max-w-[60ch]" dangerouslySetInnerHTML={{ __html: selectedAsset.desc }} />
              <div className="mt-5 border hairline aspect-[16/9] overflow-hidden">
                {selectedAsset.mockup === "web" ? <WebSafeMockup work={work} /> : <ProductMockup work={work} type={selectedAsset.mockup} />}
              </div>
              <div className="mt-5 border-t hairline pt-4">
                <div className="text-[10px] ff-mono tracking-widest uppercase muted">Approved usage</div>
                <p className="mt-1.5 text-[13px]">{selectedAsset.usage}</p>
              </div>
              <div className="mt-3 paper border hairline-strong p-3 flex items-start gap-2.5">
                <ShieldCheck size={14} className="ox flex-shrink-0 mt-0.5" />
                <div className="text-[11px] muted">Use of this asset is bound by license VC-0042. Outputs created under this license remain your work but the underlying artwork remains the property of The Pollock Estate.</div>
              </div>
              <div className="mt-5 flex flex-wrap gap-2">
                <button className="ink-bg text-white px-4 py-2 text-[10px] ff-mono tracking-[0.16em] uppercase flex items-center gap-2"><Download size={12}/> Download (logged)</button>
                <button onClick={() => setSelectedAsset(null)} className="border hairline px-4 py-2 text-[10px] ff-mono tracking-[0.16em] uppercase">Close</button>
              </div>
            </div>
          </div>
        )}

        {/* === 7. USAGE & ROYALTY TRACKER === */}
        <div className="mt-12 anim-fadeup" style={{ animationDelay: "0.35s" }}>
          <div className="flex items-end justify-between mb-4 flex-wrap gap-3">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">Usage &amp; Royalty Tracker</div>
              <h3 className="ff-display text-[26px] mt-1">Where this license is being used</h3>
              <p className="muted text-[12px] mt-1">Every campaign or product run must be reported. Royalties auto-calculate from reported sell-through.</p>
            </div>
            <button className="ox-bg text-white px-4 py-2.5 text-[11px] ff-mono tracking-[0.2em] uppercase flex items-center gap-2">
              <Plus size={12} /> Add usage report
            </button>
          </div>
          <div className="border hairline divide-y hairline">
            <div className="grid grid-cols-12 gap-4 p-3 paper text-[10px] ff-mono tracking-widest uppercase muted">
              <div className="col-span-4">Campaign</div>
              <div className="col-span-2">Territory</div>
              <div className="col-span-2">Volume</div>
              <div className="col-span-2">Status</div>
              <div className="col-span-2 text-right">Report due</div>
            </div>
            {usageReports.map(r => {
              const isLive   = r.status.startsWith("Live");
              const isApprov = r.status.startsWith("Approved");
              return (
                <div key={r.id} className="grid grid-cols-12 gap-4 p-4 items-center text-[13px]">
                  <div className="col-span-4">
                    <div className="ff-display text-[15px] leading-tight">{r.campaign}</div>
                    <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">VC-0042 · approved</div>
                  </div>
                  <div className="col-span-2 text-[12px] muted">{r.territory}</div>
                  <div className="col-span-2 ff-mono text-[11px]">{r.units}</div>
                  <div className="col-span-2">
                    <span className={"inline-flex items-center gap-1.5 px-2 py-1 text-[9px] ff-mono tracking-widest uppercase " +
                        (isLive ? "leaf-bg text-white" : isApprov ? "ink-bg text-white" : "border hairline muted")}>
                      <span className={"w-1 h-1 rounded-full " + (isLive ? "pulse-dot" : "")} style={{ background: "currentColor" }} />
                      {r.status}
                    </span>
                  </div>
                  <div className="col-span-2 text-right ff-mono text-[11px] tracking-wider uppercase">
                    {r.due === "—" ? <span className="muted">{r.due}</span> : r.due}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* === 10. SALES & ROYALTY CALCULATOR · live === */}
        {(() => {
          const grossRetail = units * retailPrice;
          const royaltyOwed = Math.round(grossRetail * 0.04);
          const cogsPerUnit = 38;
          const margin = Math.round(grossRetail - royaltyOwed - request.fee - units * cogsPerUnit);
          const breakeven = Math.max(1, Math.ceil((request.fee) / Math.max(1, retailPrice - cogsPerUnit - retailPrice * 0.04)));
          const projection = [
            { m: "M1", v: 8 }, { m: "M2", v: 22 }, { m: "M3", v: 38 }, { m: "M4", v: 56 },
            { m: "M5", v: 72 }, { m: "M6", v: 88 }, { m: "M7", v: 102 }, { m: "M8", v: 116 },
            { m: "M9", v: 128 }, { m: "M10", v: 138 }, { m: "M11", v: 148 }, { m: "M12", v: 156 },
          ];
          const projectedYearRevenue = 156 * 25 * retailPrice;
          return (
            <>
              <div className="mt-12 grid grid-cols-1 lg:grid-cols-12 gap-px ink-bg border hairline-strong anim-fadeup" style={{ animationDelay: "0.4s" }}>
                <div className="lg:col-span-5 cream p-6">
                  <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">10 — Sales reporting</div>
                  <h3 className="ff-display text-[22px] mt-1 mb-4">Royalty obligation · live</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="text-[10px] ff-mono tracking-widest uppercase muted">Units sold this period</label>
                      <div className="flex items-center gap-3 mt-1.5">
                        <input type="number" value={units} onChange={e => setUnits(parseInt(e.target.value || "0"))}
                          className="flex-1 bg-transparent border-b hairline pb-1 outline-none ff-display text-[28px] leading-none" />
                        <span className="text-[10px] ff-mono tracking-widest uppercase muted">units</span>
                      </div>
                    </div>
                    <div>
                      <label className="text-[10px] ff-mono tracking-widest uppercase muted">Retail price per unit</label>
                      <div className="flex items-center gap-3 mt-1.5">
                        <span className="ff-display text-[28px] leading-none">$</span>
                        <input type="number" value={retailPrice} onChange={e => setRetailPrice(parseInt(e.target.value || "0"))}
                          className="flex-1 bg-transparent border-b hairline pb-1 outline-none ff-display text-[28px] leading-none" />
                      </div>
                    </div>
                  </div>
                  <div className="mt-6 paper border hairline p-4 space-y-2 text-[13px]">
                    <div className="flex justify-between"><span className="muted">Gross retail value</span><span className="ff-mono">${grossRetail.toLocaleString()}</span></div>
                    <div className="flex justify-between"><span className="muted">Royalty owed (4%)</span><span className="ff-mono ox">${royaltyOwed.toLocaleString()}</span></div>
                    <div className="flex justify-between border-t hairline pt-2"><span className="muted">Net to Vogue</span><span className="ff-mono ff-display text-[16px]">${margin.toLocaleString()}</span></div>
                  </div>
                  <button className="mt-4 w-full ink-bg text-white py-3 flex items-center justify-center gap-2">
                    <Plus size={13} />
                    <span className="text-[11px] ff-mono tracking-[0.2em] uppercase">Submit sales report · auto-pay royalty</span>
                  </button>
                  <div className="mt-5 pt-4 border-t hairline">
                    <div className="text-[10px] ff-mono tracking-widest uppercase muted mb-2">Recent reports</div>
                    <div className="space-y-1.5 text-[11px] ff-mono">
                      {[["Mar 2026","1,420 units","$2,386"],["Feb 2026","892 units","$1,498"],["Jan 2026","564 units","$948"]].map((r, i) => (
                        <div key={i} className="grid grid-cols-3 gap-2">
                          <span className="muted tracking-wider uppercase">{r[0]}</span>
                          <span>{r[1]}</span>
                          <span className="text-right">{r[2]} paid</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* === 11. REVENUE PROJECTION · 12 mo forecast === */}
                <div className="lg:col-span-7 cream p-6">
                  <div className="flex items-end justify-between mb-2">
                    <div>
                      <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">11 — Revenue projection</div>
                      <h3 className="ff-display text-[22px] mt-1">Sell-through forecast · 12 mo</h3>
                    </div>
                    <div className="text-right">
                      <div className="ff-display text-[32px] leading-none">${(projectedYearRevenue / 1000000).toFixed(2)}M</div>
                      <div className="text-[10px] ff-mono tracking-widest uppercase muted mt-1">Projected gross retail</div>
                    </div>
                  </div>
                  <p className="text-[12px] muted mb-4">Modelled from comparable Hermès × Calder (2024) and LVMH × Pollock (2025) capsule data.</p>
                  <AreaChart data={projection} accent="#3D5240" height={140} showLabels />
                  <div className="mt-6 grid grid-cols-3 gap-3">
                    <div className="paper border hairline p-3">
                      <div className="text-[9px] ff-mono tracking-widest uppercase muted">Break-even</div>
                      <div className="ff-display text-[20px] mt-1">{breakeven} units</div>
                      <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">≈ M2</div>
                    </div>
                    <div className="paper border hairline p-3">
                      <div className="text-[9px] ff-mono tracking-widest uppercase muted">Total royalty owed</div>
                      <div className="ff-display text-[20px] mt-1">${(projectedYearRevenue * 0.04 / 1000).toFixed(0)}K</div>
                      <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">across 12 months</div>
                    </div>
                    <div className="paper border hairline p-3">
                      <div className="text-[9px] ff-mono tracking-widest uppercase muted">Projected net margin</div>
                      <div className="ff-display text-[20px] mt-1">56%</div>
                      <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">after royalty + COGS</div>
                    </div>
                  </div>
                </div>
              </div>
            </>
          );
        })()}

        {/* === 12. BUNDLE INTELLIGENCE · license alongside === */}
        <div className="mt-12 anim-fadeup" style={{ animationDelay: "0.45s" }}>
          <div className="flex items-end justify-between mb-5 flex-wrap gap-3">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">12 — Bundle intelligence</div>
              <h3 className="ff-display text-[28px] mt-1">License alongside · save up to 22%</h3>
              <p className="muted text-[13px] mt-2">Brands that licensed Pollock works also licensed these — historical bundle data from the platform.</p>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {[
              { artist: "Mark Rothko Foundation", work: "Untitled (Yellow, Orange)", reason: "Color-story complement · 4 buyers paired", save: "22%", fee: "$78K" },
              { artist: "Calder Estate",          work: "Mobile, 1962",              reason: "Form-language adjacent · 3 buyers paired",  save: "18%", fee: "$52K" },
              { artist: "Cy Twombly Foundation",  work: "Untitled study, 1953",      reason: "Mark-making complement · 2 buyers paired",  save: "15%", fee: "$48K" },
            ].map((b, i) => (
              <div key={i} className="paper border hairline p-5 group hover:border-[#161616]/50 transition cursor-pointer">
                <div className="flex items-start justify-between">
                  <div className="text-[10px] ff-mono tracking-widest uppercase muted">Bundle save · {b.save}</div>
                  <Plus size={14} className="ox" />
                </div>
                <div className="ff-display text-[18px] mt-3 leading-tight">{b.work}</div>
                <div className="text-[12px] ff-mono tracking-wider uppercase muted mt-1">{b.artist}</div>
                <p className="text-[12px] mt-3 muted">{b.reason}</p>
                <div className="mt-4 pt-3 border-t hairline flex items-center justify-between">
                  <span className="ff-display text-[14px]">{b.fee}</span>
                  <span className="text-[10px] ff-mono tracking-widest uppercase ink flex items-center gap-1 group-hover:translate-x-0.5 transition-transform">
                    Add to bundle <ArrowRight size={11} />
                  </span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* === 13. ROI · investor-facing summary === */}
        {(() => {
          const projectedYearRevenue = 156 * 25 * retailPrice;
          return (
            <div className="mt-12 ink-bg text-white p-10 anim-fadeup" style={{ animationDelay: "0.5s" }}>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
                <div>
                  <div className="text-[11px] ff-mono tracking-[0.2em] uppercase opacity-60">For the buyer</div>
                  <h3 className="ff-display text-[36px] leading-tight mt-3">
                    A license that <span className="italic" style={{ color: "#E8B47A" }}>pays for itself</span> in 60 days, then keeps paying.
                  </h3>
                  <p className="opacity-70 text-[14px] mt-4 leading-relaxed">
                    Vogue's $35K license becomes the foundation for a $2.6M projected scarf line — with royalty obligations tracked, paid, and audited automatically. Both sides win, and both sides have proof.
                  </p>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div className="border border-white/15 p-5">
                    <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">License fee</div>
                    <div className="ff-display text-[28px] mt-1">${request.fee.toLocaleString()}</div>
                  </div>
                  <div className="border border-white/15 p-5">
                    <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">Projected revenue</div>
                    <div className="ff-display text-[28px] mt-1" style={{ color: "#E8B47A" }}>${(projectedYearRevenue/1000000).toFixed(2)}M</div>
                  </div>
                  <div className="border border-white/15 p-5">
                    <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">ROI multiple</div>
                    <div className="ff-display text-[28px] mt-1">74×</div>
                  </div>
                  <div className="border border-white/15 p-5">
                    <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">Estate share</div>
                    <div className="ff-display text-[28px] mt-1">${Math.round(projectedYearRevenue * 0.04 / 1000)}K</div>
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        {/* === 9. FINAL CTAs · License management actions === */}
        <div className="mt-16 ink-bg text-white p-10 anim-fadeup" style={{ animationDelay: "0.4s" }}>
          <div className="flex items-end justify-between mb-6 flex-wrap gap-4">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase opacity-60">License management</div>
              <h3 className="ff-display text-[28px] leading-tight mt-2">Manage, extend, or expand this license</h3>
              <p className="opacity-65 text-[13px] mt-2 max-w-[60ch]">All requests are routed to the Estate trustees and processed through ArtChain. No new email threads, no new lawyers.</p>
            </div>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            <button className="border border-white/15 p-4 text-left hover:bg-white/5 transition">
              <FileCheck size={16} className="opacity-70 mb-2" />
              <div className="ff-display text-[15px] leading-tight">Renew license</div>
              <div className="text-[10px] ff-mono tracking-wider uppercase opacity-50 mt-1">12 mo · same fee</div>
            </button>
            <button className="border border-white/15 p-4 text-left hover:bg-white/5 transition">
              <Globe size={16} className="opacity-70 mb-2" />
              <div className="ff-display text-[15px] leading-tight">Extend territory</div>
              <div className="text-[10px] ff-mono tracking-wider uppercase opacity-50 mt-1">+region · pro-rata</div>
            </button>
            <button className="border border-white/15 p-4 text-left hover:bg-white/5 transition">
              <Plus size={16} className="opacity-70 mb-2" />
              <div className="ff-display text-[15px] leading-tight">Add product category</div>
              <div className="text-[10px] ff-mono tracking-wider uppercase opacity-50 mt-1">subject to estate</div>
            </button>
            <button className="border border-white/15 p-4 text-left hover:bg-white/5 transition opacity-70 cursor-not-allowed">
              <Zap size={16} className="opacity-70 mb-2" />
              <div className="ff-display text-[15px] leading-tight">Request AI rights</div>
              <div className="text-[10px] ff-mono tracking-wider uppercase opacity-50 mt-1">currently reserved</div>
            </button>
            <button onClick={onRestart} className="border border-white/30 ox-bg p-4 text-left hover:opacity-90 transition" style={{ background: "#6B1F1F" }}>
              <ArrowRight size={16} className="opacity-90 mb-2" />
              <div className="ff-display text-[15px] leading-tight">Start new license</div>
              <div className="text-[10px] ff-mono tracking-wider uppercase opacity-70 mt-1">browse catalog →</div>
            </button>
          </div>
        </div>

        {/* Footer note + restart */}
        <div className="mt-12 text-center anim-fadeup" style={{ animationDelay: "0.45s" }}>
          <div className="ff-display text-[20px] italic max-w-[58ch] mx-auto leading-snug muted">
            "A license is not ownership. It's permission, scoped, timed, and proven."
          </div>
          <div className="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
            <button onClick={onRestart} className="border hairline-strong px-6 py-3 flex items-center justify-center gap-2 hover:ink-bg hover:text-white transition">
              <ArrowLeft size={14} />
              <span className="text-[11px] tracking-[0.2em] uppercase ff-mono">Restart walkthrough</span>
            </button>
            <a href="https://artchain.pages.dev" target="_blank" rel="noreferrer" className="ink-bg text-white px-6 py-3 flex items-center justify-center gap-2">
              <Eye size={14} />
              <span className="text-[11px] tracking-[0.2em] uppercase ff-mono">Continue to the ask</span>
            </a>
          </div>
        </div>
      </section>
    );
  }

  function PassportField({ label, value, mono, span }) {
    return (
      <div className={span === 2 ? "col-span-2" : "col-span-1"}>
        <div className="text-[9px] ff-mono tracking-widest uppercase opacity-50">{label}</div>
        <div className={"text-[14px] mt-1 " + (mono ? "ff-mono" : "ff-display")}>{value}</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<ArtChainMVP />);
  </script>
</body>
</html>
